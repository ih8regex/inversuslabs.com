<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inversus Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0f17;
    --panel:#111725;
    --panel-2:#0e1420;
    --ink:#e6ebf2;
    --muted:#8a93a6;
    --line:#1e2638;
    --accent:#4f7cff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* HEADER */
  header{
    background:var(--panel-2);
    border-bottom:1px solid var(--line);
    padding:20px 56px;
    display:flex;
    align-items:center;
  }
  .brand{display:flex;align-items:center;gap:12px}
  .mark{
    width:28px;height:28px;
    border:1.5px solid var(--accent);
    position:relative;border-radius:4px;
  }
  .mark::after{
    content:"";position:absolute;inset:5px;
    background:var(--accent);border-radius:1px;
  }
  .brand-text{font-size:16px;font-weight:600;letter-spacing:-0.005em}
  .brand-text small{
    display:block;font-size:11px;font-weight:400;
    color:var(--muted);letter-spacing:0.04em;
    margin-top:2px;text-transform:uppercase;
  }

  /* NAV */
  nav{
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:0 56px;
    display:flex;
  }
  nav button{
    background:none;border:none;
    border-bottom:2px solid transparent;
    padding:16px 22px;margin-right:4px;
    font-family:inherit;font-size:13px;font-weight:500;
    color:var(--muted);cursor:pointer;
  }
  nav button:hover{color:var(--ink)}
  nav button.active{color:var(--ink);border-bottom-color:var(--accent)}

  /* MAIN */
  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:64px 56px;
  }
  .card{
    width:100%;
    max-width:560px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:56px 48px;
    text-align:center;
  }
  .card h1{
    font-size:28px;
    font-weight:600;
    letter-spacing:-0.015em;
  }
  .section-name{
    margin-top:14px;
    font-size:14px;
    color:var(--muted);
  }
  .divider{
    height:1px;
    background:var(--line);
    margin:32px auto;
    width:60px;
  }
  .note{font-size:13px;color:var(--muted)}
  .note a{color:var(--accent);text-decoration:none}
  .note a:hover{text-decoration:underline}
  .disclaimer{
    display:block;
    margin-top:18px;
    font-size:11px;
    line-height:1.5;
    color:var(--muted);
  }
  .card.table-view{
    max-width:840px;
    text-align:left;
  }
  .card.table-view h1,
  .card.table-view .section-name{
    text-align:center;
  }
  .table-wrap{
    overflow-x:auto;
  }
  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    color:var(--ink);
  }
  th,td{
    border-bottom:1px solid var(--line);
    padding:12px 14px;
    text-align:left;
    vertical-align:top;
  }
  th{
    color:var(--muted);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  td a{
    color:var(--accent);
    text-decoration:none;
  }
  td a:hover{text-decoration:underline}

  /* FOOTER */
  footer{
    background:var(--panel-2);
    border-top:1px solid var(--line);
    padding:18px 56px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:var(--muted);
  }

  @media (max-width:680px){
    header,nav,footer,main{padding-left:24px;padding-right:24px}
    nav{overflow-x:auto}
    nav button{padding:14px 16px;white-space:nowrap}
    .card{padding:40px 28px}
  }
</style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="mark"></div>
      <div class="brand-text">
        Inversus Labs
        <small>Security Research at Scale</small>
      </div>
    </div>
  </header>

  <nav id="nav">
    <button class="active">Home</button>
    <button>N-Day Feed</button>
    <button>CVEs</button>
    <button>Pytheas AI</button>
    <button>Contact Us</button>
  </nav>

  <main>
    <div class="card" id="page-card">
      <h1 id="page-title">Coming soon</h1>
      <p class="section-name" id="section-name"></p>
      <div class="divider"></div>
      <p class="note" id="page-note">For inquiries, contact <a href="mailto:contact@inversuslabs.com">contact@inversuslabs.com</a></p>
    </div>
  </main>

  <footer>
    <span>Inversus Labs</span>
    <span>© 2026 &nbsp;·&nbsp; All rights reserved</span>
  </footer>

  <script>
    var buttons = document.querySelectorAll('#nav button');
    var card = document.getElementById('page-card');
    var title = document.getElementById('page-title');
    var label = document.getElementById('section-name');
    var note = document.getElementById('page-note');
    var defaultTitle = title.textContent;
    var defaultNote = note.innerHTML;
    var cveRows = '';
    for (var row = 0; row < 11; row++) {
      cveRows += '<tr><td>CVE-????</td><td>Awaiting patch</td><td><a href="#">N/A</a></td></tr>';
    }
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].addEventListener('click', function(){
        for (var j = 0; j < buttons.length; j++) buttons[j].classList.remove('active');
        this.classList.add('active');
        label.textContent = this.textContent;
        card.classList.remove('table-view');
        if (this.textContent === 'CVEs') {
          card.classList.add('table-view');
          title.textContent = 'CVEs';
          note.innerHTML = '<div class="table-wrap"><table><thead><tr><th>CVE</th><th>Description</th><th>POC</th></tr></thead><tbody>' + cveRows + '</tbody></table></div>';
        } else if (this.textContent === 'Pytheas AI') {
          title.textContent = 'Schedule a 30 minute demo';
          note.innerHTML = 'To arrange a demo, email us at <a href="mailto:demo@inversuslabs.com">demo@inversuslabs.com</a><span class="disclaimer">Demos are available only to organizations and individuals in jurisdictions where Inversus Labs is permitted to provide services. Requests may be declined where access would be prohibited or restricted by applicable sanctions, export controls, or other legal requirements.</span>';
        } else {
          title.textContent = defaultTitle;
          note.innerHTML = defaultNote;
        }
      });
    }
  </script>

</body>
</html>
